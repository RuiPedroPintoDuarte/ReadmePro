<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadmePro — The Ultimate README Builder</title>
    <meta name="description" content="Build, style, and export professional README files using smart AI-powered templates.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="app-shell">

    <aside class="sidebar">
        <div class="logo">
            <svg class="logo-mascot" viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="60" cy="135" rx="28" ry="5" fill="rgba(99,102,241,0.18)"/>
                <path d="M22 18 L22 118 Q22 124 28 124 L92 124 Q98 124 98 118 L98 30 L86 18 Z" fill="#f8faff" stroke="#6366f1" stroke-width="2.5"/>
                <path d="M86 18 L86 30 L98 30 Z" fill="#c7d2fe" stroke="#6366f1" stroke-width="2"/>
                <path d="M22 72 Q8 68 10 58 Q12 50 20 52" fill="none" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round"/>
                <circle cx="10" cy="56" r="5" fill="#6366f1"/>
                <path d="M98 72 Q112 65 114 55 Q116 46 108 48" fill="none" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round"/>
                <circle cx="113" cy="51" r="5" fill="#6366f1"/>
                <circle cx="45" cy="64" r="11" fill="white" stroke="#6366f1" stroke-width="2"/>
                <circle cx="75" cy="64" r="11" fill="white" stroke="#6366f1" stroke-width="2"/>
                <circle cx="47" cy="65" r="5" fill="#1e1b4b"/>
                <circle cx="77" cy="65" r="5" fill="#1e1b4b"/>
                <circle cx="49" cy="63" r="2" fill="white"/>
                <circle cx="79" cy="63" r="2" fill="white"/>
                <rect x="34" y="53" width="22" height="22" rx="11" ry="11" fill="none" stroke="#22d3ee" stroke-width="2"/>
                <rect x="64" y="53" width="22" height="22" rx="11" ry="11" fill="none" stroke="#22d3ee" stroke-width="2"/>
                <line x1="56" y1="64" x2="64" y2="64" stroke="#22d3ee" stroke-width="2"/>
                <line x1="34" y1="60" x2="28" y2="57" stroke="#22d3ee" stroke-width="2"/>
                <line x1="86" y1="60" x2="92" y2="57" stroke="#22d3ee" stroke-width="2"/>
                <path d="M48 88 Q60 98 72 88" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round"/>
                <text x="60" y="112" font-family="monospace" font-size="13" font-weight="bold" fill="#6366f1" text-anchor="middle">#</text>
                <ellipse cx="36" cy="80" rx="6" ry="3" fill="rgba(239,68,68,0.2)"/>
                <ellipse cx="84" cy="80" rx="6" ry="3" fill="rgba(239,68,68,0.2)"/>
            </svg>
            <div>
                <h1 class="logo-title">Readme<span>Pro</span></h1>
                <p class="logo-sub">AI-Powered README Builder</p>
            </div>
        </div>

        <nav class="sidebar-nav">

            <div class="nav-section">
                <p class="nav-label">Source</p>
                <input type="file" id="fileInput" accept=".md,.txt" style="display:none;">
                <button id="uploadBtn" class="btn-upload">
                    <span class="btn-icon">↑</span> Upload README
                </button>
                <div id="uploadStatus" class="upload-status hidden">
                    <span id="uploadFileName"></span>
                    <button id="clearBtn" title="Clear">✕</button>
                </div>
                <div class="source-divider"><span>or paste below</span></div>
                <textarea id="pasteInput" class="paste-area" placeholder="Paste your README here — it will load into the editor instantly. Then click a template to reformat it."></textarea>
            </div>

            <div class="nav-section">
                <p class="nav-label">AI Templates</p>
                <button class="template-btn" data-template="minimal">
                    <span class="tmpl-icon">◻</span>
                    <div>
                        <span class="tmpl-name">Minimal</span>
                        <span class="tmpl-desc">Clean &amp; concise</span>
                    </div>
                </button>
                <button class="template-btn" data-template="pro">
                    <span class="tmpl-icon">◈</span>
                    <div>
                        <span class="tmpl-name">Professional</span>
                        <span class="tmpl-desc">Full-featured &amp; polished</span>
                    </div>
                </button>
                <button class="template-btn" data-template="frontend">
                    <span class="tmpl-icon">◉</span>
                    <div>
                        <span class="tmpl-name">Frontend App</span>
                        <span class="tmpl-desc">Web &amp; UI projects</span>
                    </div>
                </button>
                <button class="template-btn" data-template="python">
                    <span class="tmpl-icon">◆</span>
                    <div>
                        <span class="tmpl-name">Python Package</span>
                        <span class="tmpl-desc">pip install ready</span>
                    </div>
                </button>
                <button class="template-btn" data-template="api">
                    <span class="tmpl-icon">◇</span>
                    <div>
                        <span class="tmpl-name">API Reference</span>
                        <span class="tmpl-desc">Endpoints &amp; auth</span>
                    </div>
                </button>
            </div>

        </nav>

        <div class="sidebar-footer">
            <div id="statsBar" class="stats-bar">
                <span id="wordCount">0 words</span>
                <span class="stats-sep">·</span>
                <span id="lineCount">0 lines</span>
            </div>
            <button id="downloadBtn" class="btn-download">
                ↓ Download README.md
            </button>
            <p class="footer-hint">Ctrl + S to save anytime</p>
        </div>
    </aside>

    <main class="workspace">

        <div class="panel editor-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="panel-dot dot-green"></span>
                    Markdown Editor
                </div>
                <span class="panel-tag">README.md</span>
            </div>
            <textarea id="editor" spellcheck="false" placeholder="# My Awesome Project&#10;&#10;Start typing, or upload a README file to get started..."></textarea>
        </div>

        <div class="divider"></div>

        <div class="panel preview-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="panel-dot dot-blue"></span>
                    Live Preview
                </div>
                <span class="panel-tag">Rendered</span>
            </div>
            <div class="preview-scroll">
                <div id="preview" class="markdown-body"></div>
            </div>
        </div>

    </main>

    <div id="aiOverlay" class="ai-overlay hidden">
        <div class="ai-modal">
            <div class="ai-spinner"></div>
            <p id="aiStepText" class="ai-step">Initializing...</p>
            <div class="ai-progress">
                <div id="aiProgressBar" class="ai-progress-bar"></div>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
